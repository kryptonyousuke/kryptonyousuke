<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="100%">
  <defs>
    <!-- Animação do Gradiente: As cores ficam transitando infinitamente -->
    <linearGradient id="auraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2ff7">
        <animate attributeName="stop-color" values="#7b2ff7;#2f80ed;#f107a3;#7b2ff7" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#f107a3">
        <animate attributeName="stop-color" values="#f107a3;#7b2ff7;#2f80ed;#f107a3" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#2f80ed">
        <animate attributeName="stop-color" values="#2f80ed;#f107a3;#7b2ff7;#2f80ed" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="hudGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.03" />
    </pattern>

    <!-- Estilos CSS para as animações de entrada e movimento -->
    <style>
      /* --- Animação Principal Mais Lenta --- */
      @keyframes expandSides {
        0% { clip-path: polygon(50% -50%, 50% -50%, 50% 150%, 50% 150%); }
        100% { clip-path: polygon(-20% -50%, 120% -50%, 120% 150%, -20% 150%); }
      }
      .expand-wrapper {
        /* Aumentado de 0.8s para 2.5s */
        animation: expandSides 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      }

      /* Animações de Entrada (Traçados e Opacidade) */
      @keyframes drawLine {
        from { stroke-dashoffset: 350; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 0.12; }
      }
      @keyframes slideUp {
        from { transform: translateY(15px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes popIn {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      /* Animações Infinitas */
      @keyframes march {
        from { stroke-dashoffset: 24; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes pulseNode {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.6); opacity: 1; filter: brightness(1.5); }
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Aplicação das classes (tempos reajustados para a abertura mais lenta) */
      .glowing-path {
        stroke-dasharray: 350;
        stroke-dashoffset: 350;
        /* Acompanha os mesmos 2.5s da abertura */
        animation: drawLine 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
      }
      .aura-fill {
        opacity: 0;
        /* Espera 1.5s para aparecer */
        animation: fadeIn 2s ease-in-out 1.5s forwards;
      }
      .data-line {
        animation: march 2.5s linear infinite; /* Mais devagar também */
      }
      .data-path {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        /* Espera 1.8s */
        animation: drawLine 1s ease-out 1.8s forwards;
      }
      .node {
        transform-box: fill-box;
        transform-origin: center;
        opacity: 0;
        /* Espera 2.2s */
        animation: popIn 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) 2.2s forwards, 
                   pulseNode 2s ease-in-out 2.7s infinite;
      }
      .node-delay { animation-delay: 2.4s, 2.9s; }
      
      .corner-mark { animation: breathe 3s ease-in-out infinite; }
      .grid-layer { animation: breathe 4s ease-in-out infinite; }

      /* Entradas de Texto (Staggered mais lentos) */
      .anim-text-1 { opacity: 0; animation: slideUp 0.8s ease-out 1.2s forwards; }
      .anim-text-2 { opacity: 0; animation: slideUp 0.8s ease-out 1.4s forwards; }
      .anim-text-3 { opacity: 0; animation: slideUp 0.8s ease-out 1.6s forwards; }
      .anim-text-4 { opacity: 0; animation: slideUp 0.8s ease-out 1.8s forwards; }
      .anim-text-5 { opacity: 0; animation: slideUp 0.8s ease-out 2.0s forwards; }
      .anim-text-6 { opacity: 0; animation: slideUp 0.8s ease-out 2.2s forwards; }
      
      .status-active { animation: breathe 1.5s ease-in-out infinite; }
      .cursor-blink { animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <!-- O Grupo com "expand-wrapper" engloba e clipa tudo dentro, realizando a abertura horizontal -->
  <g class="expand-wrapper">
    <!-- Background e Grid -->
    <rect x="10" y="10" width="980" height="240" rx="12" fill="#0d1117" stroke="#1f2937" stroke-width="1" />
    <rect class="grid-layer" x="12" y="12" width="976" height="236" rx="11" fill="url(#hudGrid)" />
    
    <!-- Auras (Fill) -->
    <path class="aura-fill" d="M 10 50 L 10 22 C 10 15, 15 10, 22 10 L 120 10 L 140 30 L 40 30 L 20 50 Z" fill="url(#auraGrad)" />
    <path class="aura-fill" d="M 990 200 L 990 238 C 990 245, 985 250, 978 250 L 880 250 L 860 230 L 960 230 L 980 210 Z" fill="url(#auraGrad)" />
    
    <!-- Linhas Neon Desenhadas -->
    <path class="glowing-path" d="M 10 70 L 10 25 L 25 10 L 220 10" fill="none" stroke="url(#auraGrad)" stroke-width="3" filter="url(#neonGlow)" stroke-linecap="round" />
    <path class="glowing-path" d="M 990 190 L 990 235 L 975 250 L 780 250" fill="none" stroke="url(#auraGrad)" stroke-width="3" filter="url(#neonGlow)" stroke-linecap="round" />
    
    <!-- Linhas Tracejadas Animadas (Data Flow) -->
    <line class="data-line" x1="40" y1="75" x2="960" y2="75" stroke="#232d3d" stroke-width="1" stroke-dasharray="4,8" />
    <line class="data-line" x1="40" y1="185" x2="960" y2="185" stroke="#232d3d" stroke-width="1" stroke-dasharray="4,8" />
    
    <!-- Path Nodes Esquerdo -->
    <path class="data-path" d="M 45 75 L 65 95 L 140 95" fill="none" stroke="#7b2ff7" stroke-width="2" opacity="0.6" />
    <circle class="node" cx="140" cy="95" r="3" fill="#7b2ff7" filter="url(#neonGlow)" />
    
    <!-- Path Nodes Direito -->
    <path class="data-path" d="M 955 185 L 935 165 L 840 165" fill="none" stroke="#2f80ed" stroke-width="2" opacity="0.6" />
    <circle class="node node-delay" cx="840" cy="165" r="3" fill="#2f80ed" filter="url(#neonGlow)" />
    
    <!-- Detalhes HUD de canto (Crosshairs) -->
    <path class="corner-mark" d="M 25 35 L 35 35 M 35 25 L 35 35" fill="none" stroke="#f107a3" stroke-width="1.5" opacity="0.6" />
    <path class="corner-mark" d="M 975 225 L 965 225 M 965 235 L 965 225" fill="none" stroke="#2f80ed" stroke-width="1.5" opacity="0.6" />
    
    <!-- Textos do Painel -->
    <text class="anim-text-1" x="50" y="142" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="900" letter-spacing="5">KRYPTON</text>
    
    <g class="anim-text-2">
      <rect x="335" y="106" width="225" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1" />
      <text x="345" y="122" fill="url(#auraGrad)" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">GRAPHICS &amp; DESKTOP DEV</text>
    </g>

    <!-- Barra de Status inferior -->
    <text class="anim-text-3" x="52" y="174" fill="#8b949e" font-family="monospace" font-size="11" letter-spacing="0.5">
      STATUS: <tspan class="status-active" fill="#56d364" font-weight="bold">ACTIVE</tspan><tspan class="cursor-blink" fill="#56d364">_</tspan> // SYS: <tspan fill="#1793D1">ARCH_LINUX</tspan> // CORE: <tspan fill="#ff7b72">C++ / RUST</tspan> // IDE: ZED // RENDERING: FLUID_HIGH_PERF
    </text>
    
    <!-- Informações Alinhadas à Direita -->
    <g font-family="monospace" font-size="11" text-anchor="end" opacity="0.9">
      <text class="anim-text-4" x="940" y="115" fill="#8b949e">ECOSYSTEM: <tspan fill="#f107a3">ANIHUB // AURA</tspan></text>
      <text class="anim-text-5" x="940" y="135" fill="#8b949e">GRAPHICS_API: <tspan fill="#ffffff">VULKAN_NATIVE</tspan></text>
      <text class="anim-text-6" x="940" y="155" fill="#2f80ed" font-weight="bold">"ACCURACY IS NOT ARROGANCE"</text>
    </g>
  </g>
</svg>
