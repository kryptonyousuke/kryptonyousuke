<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="100%"><defs><linearGradient id="auraGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#7b2ff7"><animate attributeName="stop-color" values="#7b2ff7;#2f80ed;#f107a3;#7b2ff7" dur="6s" repeatCount="indefinite"/></stop><stop offset="50%" stop-color="#f107a3"><animate attributeName="stop-color" values="#f107a3;#7b2ff7;#2f80ed;#f107a3" dur="6s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#2f80ed"><animate attributeName="stop-color" values="#2f80ed;#f107a3;#7b2ff7;#2f80ed" dur="6s" repeatCount="indefinite"/></stop></linearGradient><filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="hudGrid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#fff" opacity=".03"/></pattern><style>@keyframes e{0%{clip-path:polygon(50% -50%,50% -50%,50% 150%,50% 150%)}100%{clip-path:polygon(-20% -50%,120% -50%,120% 150%,-20% 150%)}}.expand-wrapper{animation:e 2.5s cubic-bezier(.1,.8,.2,1) forwards}@keyframes dl{from{stroke-dashoffset:350}to{stroke-dashoffset:0}}@keyframes fi{from{opacity:0}to{opacity:.12}}@keyframes su{from{transform:translateY(15px);opacity:0}to{transform:translateY(0);opacity:1}}@keyframes pi{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}@keyframes m{from{stroke-dashoffset:24}to{stroke-dashoffset:0}}@keyframes pn{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.6);opacity:1;filter:brightness(1.5)}}@keyframes br{0%,100%{opacity:.6}50%{opacity:1}}@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}.glowing-path{stroke-dasharray:350;stroke-dashoffset:350;animation:dl 2.5s cubic-bezier(.1,.8,.2,1) forwards}.aura-fill{opacity:0;animation:fi 2s ease-in-out 1.5s forwards}.data-line{animation:m 2.5s linear infinite}.data-path{stroke-dasharray:100;s